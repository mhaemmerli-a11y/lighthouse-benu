name: Daily Lighthouse Test BENU

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Home
            url: https://www.benu.ch/
          - name: Editorial
            url: https://www.benu.ch/e/flohsamen-das-kleine-wundermittel-mit-grosser-wirkung
          - name: Pharmacy
            url: https://www.benu.ch/p/benu-luzern-bahnhof
          - name: PDP
            url: https://www.benu.ch/sulgan-n-salbe-50-g
          - name: Category
            url: https://www.benu.ch/c/gesundheit/

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse – ${{ matrix.name }}
        run: |
          lighthouse "${{ matrix.url }}" \
            --output html --output json \
            --output-path ./lighthouse-report \
            --chrome-flags="--headless --no-sandbox" \
            --quiet

      - name: Scores auslesen
        id: scores
        run: |
          PERF=$(python3 -c "import json; d=json.load(open('lighthouse-report.report.json')); print(int(d['categories']['performance']['score']*100))")
          ACC=$(python3 -c "import json; d=json.load(open('lighthouse-report.report.json')); print(int(d['categories']['accessibility']['score']*100))")
          SEO=$(python3 -c "import json; d=json.load(open('lighthouse-report.report.json')); print(int(d['categories']['seo']['score']*100))")
          BP=$(python3 -c "import json; d=json.load(open('lighthouse-report.report.json')); print(int(d['categories']['best-practices']['score']*100))")
          echo "performance=$PERF" >> $GITHUB_OUTPUT
          echo "accessibility=$ACC" >> $GITHUB_OUTPUT
          echo "seo=$SEO" >> $GITHUB_OUTPUT
          echo "best_practices=$BP" >> $GITHUB_OUTPUT

      - name: Job Summary schreiben
        run: |
          echo "## 🔦 ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ matrix.url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Kategorie | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Performance | ${{ steps.scores.outputs.performance }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| ♿ Accessibility | ${{ steps.scores.outputs.accessibility }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SEO | ${{ steps.scores.outputs.seo }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Best Practices | ${{ steps.scores.outputs.best_practices }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: HTML Report speichern
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ matrix.name }}-${{ github.run_number }}
          path: lighthouse-report.report.html
          retention-days: 30
